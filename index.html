<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikochat Q&A</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main id="launchScreen" class="launch-screen">
    <header class="launch-header">
      <button id="openChatBtn" class="agent-bar" type="button" aria-label="Chat with an agent">
        <span class="agent-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a8 8 0 0 1-8 8H7l-4 3v-7a8 8 0 1 1 18-4Z" />
            <path d="M8 12h.01" />
            <path d="M12 12h.01" />
            <path d="M16 12h.01" />
          </svg>
        </span>
        <span>Chat with an agent</span>
      </button>
    </header>

    <section class="launch-content" aria-label="FAQ browser">
      <div class="launch-category-carousel">
        <button id="categoryPrevBtn" class="category-arrow" type="button" aria-label="Previous categories">&lsaquo;</button>
        <div id="launchCategoryGrid" class="launch-category-grid" aria-label="Categories"></div>
        <button id="categoryNextBtn" class="category-arrow" type="button" aria-label="Next categories">&rsaquo;</button>
      </div>
      <div id="launchQuestionPanel" class="launch-question-panel" aria-live="polite"></div>
    </section>
  </main>

  <main id="chatPanel" class="chat-panel is-hidden">
    <aside id="historyPanel" class="history-panel" aria-label="Conversation history">
      <div class="history-topbar">
        <button id="closeHistoryBtn" class="icon-btn" type="button" aria-label="Close conversations">
          <span aria-hidden="true">&times;</span>
        </button>
        <button id="newChatBtn" class="new-chat-btn" type="button">New chat</button>
      </div>
      <label class="history-search" for="historySearch">
        <span class="visually-hidden">Search conversation history</span>
        <input id="historySearch" type="search" placeholder="Search" autocomplete="off" />
      </label>
      <div id="historyList" class="history-list" aria-label="Recent Questions"></div>
    </aside>

    <div id="sidebarScrim" class="sidebar-scrim" aria-hidden="true"></div>

    <section class="chat-shell" aria-label="Pikochat conversation">
      <header class="chat-header">
        <button id="menuBtn" class="icon-btn menu-btn" type="button" aria-label="Open conversations">
          <span aria-hidden="true"></span>
        </button>
        <button id="backToLaunchBtn" class="back-btn" type="button" aria-label="Back to first screen">&larr;</button>
        <div class="chat-title-copy">
          <h1>Pikochat</h1>
          <span id="statusText" class="status-text">Loading source document...</span>
        </div>
      </header>

      <div id="chatWindow" class="chat-window">
        <section id="emptyState" class="empty-state" aria-label="Empty conversation"></section>
      </div>

      <form id="chatForm" class="chat-form">
        <div class="input-shell">
          <textarea id="userInput" placeholder="Message Pikochat" autocomplete="off" rows="1"></textarea>
          <button class="send-btn" type="submit" aria-label="Send message">&uarr;</button>
        </div>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
