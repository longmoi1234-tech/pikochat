<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikochat Q&A</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main id="launchScreen" class="launch-screen">
    <header class="launch-header">
      <button id="openChatBtn" class="agent-bar" type="button" aria-label="Chat with an agent">
        <span class="agent-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a8 8 0 0 1-8 8H7l-4 3v-7a8 8 0 1 1 18-4Z" />
            <path d="M8 12h.01" />
            <path d="M12 12h.01" />
            <path d="M16 12h.01" />
          </svg>
        </span>
        <span>Chat with an agent</span>
      </button>
    </header>

    <section class="launch-content" aria-label="FAQ browser">
      <div class="launch-category-carousel">
        <button id="categoryPrevBtn" class="category-arrow" type="button" aria-label="Previous categories">&lsaquo;</button>
        <div id="launchCategoryGrid" class="launch-category-grid" aria-label="Categories"></div>
        <button id="categoryNextBtn" class="category-arrow" type="button" aria-label="Next categories">&rsaquo;</button>
      </div>
      <div id="launchQuestionPanel" class="launch-question-panel" aria-live="polite"></div>
    </section>
  </main>

  <main id="chatPanel" class="chat-panel is-hidden">
    <div class="chat-header">
      <div class="chat-title-row">
        <button id="backToLaunchBtn" class="back-btn" type="button" aria-label="Back to first screen">&larr;</button>
        <h1>Pikochat</h1>
      </div>
      <div id="statusText" class="status-text">Loading source document...</div>
    </div>

    <div id="chatWindow" class="chat-window"></div>

    <form id="chatForm" class="chat-form">
      <div class="input-shell">
        <input id="userInput" type="text" placeholder="Type or speak a question..." autocomplete="off" />
        <button id="micBtn" class="mic-btn" type="button" aria-label="Use microphone" title="Use microphone">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
            <path d="M19 11a7 7 0 0 1-14 0" />
            <path d="M12 18v3" />
            <path d="M8 21h8" />
          </svg>
        </button>
      </div>
      <button class="send-btn" type="submit" aria-label="Send">&rarr;</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>

</html>
